server:
  port: 8081
  error:
    include-message: always
    include-stacktrace: always

spring:
  datasource:
    # H2 in file mode for local dev. Data persists across backend restarts.
    # File location: backend/data/forestry-reviewer.mv.db (gitignored).
    # To wipe local data: `rm -rf backend/data` and restart.
    # Tests use an in-memory H2 instance (see src/test/resources/application.yml).
    # PostgreSQL config is below, commented out — switch when ready.
    url: jdbc:h2:file:./data/forestry-reviewer
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false  # Enable when using PostgreSQL
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

