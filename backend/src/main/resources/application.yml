server:
  port: 8081
  error:
    include-message: always
    include-stacktrace: always

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/forestry_ai_reviewer
    driver-class-name: org.postgresql.Driver
    username: forestry
    password: forestry
  jpa:
    hibernate:
      # Flyway owns the schema. ddl-auto=validate makes Hibernate cross-check
      # the entity model against the live schema at boot and fail fast on drift.
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

upload:
  dir: ./uploads

# Review provider selection. Supported values: mock, llm
# - mock: deterministic local fixture (default, no external API calls)
# - llm:  real LLM-backed provider (requires ANTHROPIC_API_KEY or OPENAI_API_KEY)
app:
  review:
    provider: mock
  llm:
    # "anthropic" or "openai"
    provider: anthropic
    # Provider-specific model identifier
    model: claude-sonnet-4-6
    # Read timeout for the LLM HTTP call
    timeout-seconds: 60
    # Cap on tokens returned by the model
    max-output-tokens: 4096
    # API keys are sourced from environment variables:
    #   ANTHROPIC_API_KEY   when llm.provider=anthropic
    #   OPENAI_API_KEY      when llm.provider=openai
    # Never commit keys to source control.

logging:
  level:
    com.forestry.aireviewer: DEBUG
